character_llm: gpt-4o-mini
narrator_llm: qwen3-32b
npc_llm: qwen3-32b

# Fallback scene (used only if autogen fails)
scene_path: generated_scenes/xxx.json
scene_id: 0
scene_language: en

# Autogen scene from persona
autogen_scene_from_persona: true
persona_jsonl_path: persona_data/xxx.jsonl
persona_index: 1

record_dir: output/record
save_record: true
character_record_path: character.jsonl
round_record_path: round.jsonl
sim_record_path: simulation.txt

max_rounds: 20
checkpoint_round_interval: 1

max_token: 8192
temperature: 0.5
max_retries: 5
model_kwargs:
  extra_body:
    enable_thinking: false
    chat_template_kwargs:
      enable_thinking: false
verbose: true

character_provider: azure
character_api_key: xxx
character_api_base: https://xxx.com/

narrator_provider: openai
narrator_api_key: empty
narrator_api_base: http://xxx/v1

npc_provider: openai
npc_api_key: empty
npc_api_base: http://xxx/v1

play_role: -1
npc_human_control: false

# Extra settings from original file
provider: openai
character_api_version: xxx
autogen_output_dir: generated_scenes
autogen_scene_title_prefix: xxx
plot_record_path: plot.jsonl
all_record_path: all.jsonl
narrator_record_path: narrator.jsonl
