character_llm: gpt-4.1
narrator_llm: gpt-4.1
npc_llm: gpt-4.1

# Fallback scene (used only if autogen fails)
scene_path: generated_scenes/xxx.json
scene_id: 0
scene_language: en

# Autogen scene from persona
autogen_scene_from_persona: true
persona_jsonl_path: persona_data/1000_persona.jsonl
persona_index: 1

record_dir: output/record
save_record: true
character_record_path: character.jsonl
round_record_path: round.jsonl
sim_record_path: simulation.txt

max_rounds: 20
checkpoint_round_interval: 1

max_token: 8192
temperature: 0.5
max_retries: 5
model_kwargs:
  extra_body:
    enable_thinking: false
    chat_template_kwargs:
      enable_thinking: false
verbose: true

character_provider: azure
character_api_key: xxx
character_api_base: https://xxx.openai.azure.com

narrator_provider: azure
narrator_api_key: xxx
narrator_api_base: https://xxx.openai.azure.com

npc_provider: azure
npc_api_key: xxx
npc_api_base: https://xxx.openai.azure.com

play_role: -1
npc_human_control: false

# Extra settings from original file
environment_scene_llm: gpt-4.1
provider: openai
character_api_version: xxx
narrator_api_version: xxx
environment_scene_provider: azure
environment_scene_api_base: https://xxx.openai.azure.com
environment_scene_api_key: xxx
environment_scene_api_version: xxx
npc_api_version: xxx
autogen_output_dir: generated_scenes
autogen_scene_title_prefix: xxx
plot_record_path: plot.jsonl
all_record_path: all.jsonl
narrator_record_path: narrator.jsonl
